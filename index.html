<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Happy 80th Birthday!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="hero">
  <p class="eyebrow">A Celebration in Photos</p>
  <h1>Happy 80th Birthday!</h1>
  <p class="subtitle">Eight decades of memories, love, and laughter</p>
</header>

<main>
  <section id="gallery" class="gallery" aria-label="Photo gallery"></section>
</main>

<footer>
  <p>Made with love, for the best grandmother in the world.</p>
</footer>

<div id="lightbox" class="lightbox" hidden>
  <button class="lightbox-close" aria-label="Close">&times;</button>
  <button class="lightbox-prev" aria-label="Previous photo">&#10094;</button>
  <img class="lightbox-image" src="" alt="">
  <button class="lightbox-next" aria-label="Next photo">&#10095;</button>
</div>

<script src="js/photos.js"></script>
<script src="js/script.js"></script>
</body>
</html>
