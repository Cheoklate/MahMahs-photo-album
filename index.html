<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Happy 80th Birthday!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:ital@0;1&display=swap" rel="stylesheet">
<!-- ?v= is bumped whenever style.css or script.js changes: GitHub Pages caches
     assets for 10 minutes with no way to disable it, so without a new URL a
     browser can keep serving a stale script.js/style.css after a deploy. -->
<link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>

<header class="hero">
  <p class="eyebrow">A Celebration in Photos</p>
  <h1>Happy 80th Birthday!</h1>
  <p class="subtitle">Eight decades of memories, love, and laughter</p>
</header>

<main>
  <section id="albums-view" class="albums-view">
    <div id="albums-grid" class="gallery" aria-label="Albums"></div>
  </section>

  <section id="album-view" class="album-view" hidden>
    <button id="back-to-albums" class="back-button">&#8592; All Albums</button>
    <h2 id="album-title"></h2>
    <div id="album-grid" class="gallery" aria-label="Photos in album"></div>
  </section>
</main>

<footer>
  <p>Made with love, for the best grandmother in the world.</p>
  <p>Made by Gregory the Great</p>
</footer>

<div id="lightbox" class="lightbox" hidden>
  <button class="lightbox-close" aria-label="Close">&times;</button>
  <button class="lightbox-prev" aria-label="Previous photo">&#10094;</button>
  <div class="lightbox-viewport">
    <div class="lightbox-track">
      <img class="lightbox-slide" data-slide="prev" src="" alt="" draggable="false">
      <img class="lightbox-slide" data-slide="current" src="" alt="" draggable="false">
      <img class="lightbox-slide" data-slide="next" src="" alt="" draggable="false">
    </div>
  </div>
  <button class="lightbox-next" aria-label="Next photo">&#10095;</button>
</div>

<script src="js/script.js?v=2"></script>
</body>
</html>
